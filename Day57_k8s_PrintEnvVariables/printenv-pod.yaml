apiVersion: v1
kind: Pod
metadata:
  labels:
    run: print-envars-greeting
  name: print-envars-greeting
spec:
  containers:
  - command: ["/bin/sh", "-c", 'echo "$(GREETING) $(COMPANY) $(GROUP)"']
    env:
    - name: GREETING
      value: Welcome to
    - name: COMPANY
      value: Nautilus
    - name: GROUP
      value: Datacenter
    image: bash
    name: print-env-container
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Never
status: {}